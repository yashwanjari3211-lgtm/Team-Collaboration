services:
  db:
    image: mirror.gcr.io/library/postgres:15-alpine
    container_name: saas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    container_name: saas_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env # <-- your backend .env (incl. GOOGLE_CLIENT_ID, etc.)
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
